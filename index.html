<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Constant Delivery – Your World, Delivered Faster. Real-time tracking, reliable couriers, and seamless delivery experiences." />
    <meta name="theme-color" content="#7c3aed" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <title>Constant Delivery – Your World, Delivered Faster</title>
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.classList.add(theme);
        if (theme === 'dark') {
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#09090b');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
